<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Comisiones · Regional — TechGuide</title>
<style>
:root{
  --bg:#000;--surface:#1C1C1E;--surface2:#2C2C2E;--surface3:#3A3A3C;
  --label:#FFF;--label2:#EBEBF5;--label3:#8E8E93;--label4:#48484A;--sep:rgba(255,255,255,0.10);
  --tint:rgba(255,255,255,.04);--shadow:rgba(0,0,0,.4);
  --blue:#00A8E0;--cyan:#5BC2E7;
  --green:#30D158;--red:#FF453A;--amber:#FFD60A;
  --t-blue:#5BC2E7;--t-green:#5BE584;--t-amber:#FFD60A;--t-red:#FF8A80;--t-orange:#FF9F0A;
  --r-xl:22px;--r-lg:16px;--r-md:12px;--r-sm:9px;
  --fd:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,sans-serif;
  --fm:"SF Mono","Roboto Mono",ui-monospace,monospace;--ease:cubic-bezier(.16,1,.3,1);
}
.phone[data-theme="light"]{
  --bg:#F2F2F7;--surface:#FFFFFF;--surface2:#EFEFF4;--surface3:#E3E3E8;
  --label:#000;--label2:#1C1C1E;--label3:#8E8E93;--label4:#B8B8BE;--sep:rgba(0,0,0,0.09);
  --tint:rgba(0,0,0,.035);--shadow:rgba(0,0,0,.10);
  --blue:#0090C4;--cyan:#0090C4;
  --green:#1E9E45;--red:#D0291C;--amber:#B58A00;
  --t-blue:#0080B5;--t-green:#178A3C;--t-amber:#A57C00;--t-red:#C42818;--t-orange:#CF5A00;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:#0a0a0c;color:var(--label);font-family:var(--fd);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 12px;-webkit-font-smoothing:antialiased}
.phone{width:100%;max-width:412px;background:var(--bg);color:var(--label);border-radius:38px;overflow:hidden;position:relative;box-shadow:0 0 0 10px #1a1a1c,0 30px 80px -20px rgba(0,0,0,.9);min-height:800px;display:flex;flex-direction:column}
.statusbar{height:14px}
.hdr{padding:14px 20px 8px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 70%,transparent);z-index:20}
.hdr .back{color:var(--t-blue);font-size:15px;font-weight:500}
.hdr .htitle{text-align:center}.hdr h1{font-size:17px;font-weight:700;margin:0;letter-spacing:-.2px}.hdr .hrole{font-size:10.5px;color:var(--label3);font-weight:600}
.themebtn{border:none;background:var(--surface2);color:var(--label2);width:34px;height:30px;border-radius:9px;cursor:pointer;font-size:14px;display:grid;place-items:center;line-height:1}.themebtn:active{transform:scale(.92)}
.scroll{flex:1;overflow-y:auto;padding:4px 16px 34px}.scroll::-webkit-scrollbar{display:none}
.weeks{display:flex;gap:7px;padding:6px 4px 14px;overflow-x:auto}.weeks::-webkit-scrollbar{display:none}
.wk{flex:0 0 auto;border:none;cursor:pointer;font-family:var(--fd);background:var(--surface);color:var(--label3);border-radius:999px;padding:8px 15px;font-size:13px;font-weight:600;transition:.18s}
.wk small{display:block;font-size:9px;font-weight:600;opacity:.7;letter-spacing:.4px;text-transform:uppercase}
.wk.on{background:var(--label);color:var(--bg)}

.hero{background:radial-gradient(130% 130% at 0% 0%,rgba(0,168,224,.18),var(--surface) 55%);border:1px solid rgba(0,168,224,.22);border-radius:var(--r-xl);padding:17px 19px}
.hero h2{font-size:23px;font-weight:700;margin:0 0 11px;letter-spacing:-.4px}
.idrow{display:flex;align-items:center;gap:13px}
.idav{width:46px;height:46px;border-radius:13px;flex:0 0 auto;background:rgba(0,168,224,.18);color:var(--t-blue);display:grid;place-items:center;font-family:var(--fm);font-weight:800;font-size:16px}
.idname{font-size:19px;font-weight:700;letter-spacing:-.3px}
.idrole{font-size:12.5px;color:var(--label3);font-weight:500;margin-top:3px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px}
.chip.ok{background:rgba(48,209,88,.16);color:var(--t-green)}.chip.no{background:rgba(255,214,10,.16);color:var(--t-amber)}

.slab{font-size:12.5px;color:var(--label3);font-weight:700;letter-spacing:.3px;text-transform:uppercase;margin:22px 6px 10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.simnote{font-size:11px;color:var(--label3);line-height:1.45;background:var(--tint);border-radius:12px;padding:11px 14px;margin-top:20px;text-align:center}.simnote b{color:var(--label2);font-weight:700}
.slab .cnt{color:var(--label4);font-family:var(--fm);text-transform:none}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{background:var(--surface);border-radius:15px;padding:14px 15px}
.tile.full{grid-column:1/-1}
.tih{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--label2)}
.tih .lock{margin-left:auto;font-size:9.5px;font-weight:700;color:var(--label3);background:var(--tint);padding:3px 9px;border-radius:6px}
.tiv{font-family:var(--fm);font-size:27px;font-weight:700;letter-spacing:-1px;margin:8px 0 9px;font-variant-numeric:tabular-nums}
.tiv.green{color:var(--t-green)}.tiv.amber{color:var(--t-amber)}.tiv.empty{color:var(--label4)}
.tibar{height:7px;background:var(--surface3);border-radius:99px;overflow:hidden}
.tibarf{display:block;height:100%;border-radius:99px}.tibarf.green{background:linear-gradient(90deg,var(--green),#5BE584)}.tibarf.amber{background:linear-gradient(90deg,var(--amber),#FFE34D)}
.tisub{font-size:10.5px;color:var(--label3);font-weight:500;margin-top:9px}

.gwrap{display:flex;flex-direction:column;gap:9px}
.tbtn{display:flex;align-items:center;gap:12px;width:100%;cursor:pointer;border:none;font-family:var(--fd);background:var(--surface);border-radius:14px;padding:13px 15px;transition:.15s;text-align:left}
.tbtn:active{transform:scale(.99)}
.tava{width:38px;height:38px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;font-size:13px;font-weight:800;font-family:var(--fm);background:rgba(0,168,224,.16);color:var(--t-blue)}
.tava.dim{background:var(--surface3);color:var(--label4)}
.tmeta{flex:1;min-width:0;display:flex;flex-direction:column}
.tmeta .tn{font-size:14.5px;font-weight:700;letter-spacing:-.2px;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmeta .tsub{font-size:11.5px;color:var(--label3);font-weight:500;margin-top:3px}
.tmini{width:54px;height:6px;background:var(--surface3);border-radius:99px;overflow:hidden;flex:0 0 auto}
.tmini .tf{height:100%;border-radius:99px}.tf.green{background:linear-gradient(90deg,var(--green),#5BE584)}.tf.amber{background:linear-gradient(90deg,var(--amber),#FFE34D)}
.tpct{font-family:var(--fm);font-weight:700;font-size:11.5px}.tpct.green{color:var(--t-green)}.tpct.amber{color:var(--t-amber)}
.tchev{color:var(--label4);font-size:18px;flex:0 0 auto}
.tbadge{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(255,214,10,.16);color:var(--t-amber);white-space:nowrap}

.scrim{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.25s;z-index:40;backdrop-filter:blur(2px)}.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:50;background:var(--surface);border-radius:26px 26px 0 0;padding:8px 18px 24px;transform:translateY(110%);transition:transform .32s var(--ease);max-height:94%;overflow-y:auto}.sheet::-webkit-scrollbar{display:none}.sheet.on{transform:translateY(0)}
.grip{width:38px;height:5px;background:var(--surface3);border-radius:9px;margin:6px auto 12px}
.shead{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.shead .sava{width:36px;height:36px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;font-size:13px;font-weight:800;font-family:var(--fm);background:rgba(0,168,224,.16);color:var(--t-blue)}
.shead h2{font-size:19px;font-weight:700;margin:0;letter-spacing:-.3px;flex:1}
.shead .sb{border:none;background:var(--surface2);color:var(--t-blue);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:17px;display:grid;place-items:center}
.scand{display:flex;align-items:center;justify-content:space-between;background:var(--tint);border-radius:12px;padding:11px 13px;margin-bottom:4px}
.scand .scl{font-size:12px;color:var(--label2);font-weight:600}
.scand .scv{font-family:var(--fm);font-size:14px;font-weight:700}.scand .scv.green{color:var(--t-green)}.scand .scv.amber{color:var(--t-amber)}.scand .scv.empty{color:var(--label4)}
.tabs{display:flex;gap:6px;background:var(--surface2);border-radius:11px;padding:3px;margin:14px 0 8px}
.tab{flex:1;border:none;background:none;cursor:pointer;font-family:var(--fd);color:var(--label3);font-size:13.5px;font-weight:600;padding:9px;border-radius:8px;transition:.15s}
.tab.on{background:var(--surface);color:var(--label);box-shadow:0 1px 3px var(--shadow)}
.pane{display:none}.pane.on{display:block}
.ssub{font-size:12px;color:var(--label3);font-weight:500;margin:6px 0 4px;padding-left:1px}
.metrow{padding:13px 0}.metrow+.metrow{border-top:1px solid var(--sep)}
.mtop{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:9px}
.mlab{font-size:14px;font-weight:600}.mlab .me{margin-right:7px}
.qbox{display:flex;align-items:center;gap:7px;flex:0 0 auto}.qbox label{font-size:10.5px;color:var(--label3);font-weight:600}
.qbox input{width:78px;font-family:var(--fm);font-size:15px;font-weight:700;color:var(--label);background:var(--surface2);border:1px solid var(--sep);border-radius:10px;padding:9px 11px;text-align:center;outline:none;-moz-appearance:textfield}
.qbox input::-webkit-outer-spin-button,.qbox input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}.qbox input:focus{border-color:var(--blue)}
.mbot{display:flex;align-items:center;gap:10px}.mbot .mreal{font-size:11.5px;color:var(--label3);font-weight:500;width:74px;flex:0 0 auto}
.mbar{flex:1;height:7px;background:var(--surface3);border-radius:99px;overflow:hidden}.mbar .mf{height:100%;border-radius:99px;transition:width .35s var(--ease)}.mf.green{background:linear-gradient(90deg,var(--green),#5BE584)}.mf.amber{background:linear-gradient(90deg,var(--amber),#FFE34D)}
.mpct{font-family:var(--fm);font-size:12px;font-weight:700;width:58px;text-align:right;flex:0 0 auto}.mpct.green{color:var(--t-green)}.mpct.amber{color:var(--t-amber)}.mpct.empty{color:var(--label4)}
.savebtn{width:100%;border:none;cursor:pointer;font-family:var(--fd);font-size:16px;font-weight:700;background:var(--blue);color:#fff;height:50px;border-radius:14px;margin-top:18px}.savebtn:active{transform:translateY(1px)}
.shint{font-size:11px;color:var(--label3);line-height:1.45;margin:12px 2px 0;text-align:center}
.candbig{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--tint);border-radius:13px;padding:13px 14px}
.candbig .cbl{font-size:12.5px;font-weight:600;color:var(--label2);display:flex;align-items:center;gap:6px}
.candbig .cbv{font-family:var(--fm);font-size:14px;font-weight:700;flex:0 0 auto}.candbig .cbv.green{color:var(--t-green)}.candbig .cbv.amber{color:var(--t-amber)}.candbig .cbv.empty{color:var(--label4)}
.seclab{font-size:11px;color:var(--label3);font-weight:700;letter-spacing:.3px;text-transform:uppercase;margin:18px 2px 9px}
.minis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mini{display:flex;flex-direction:column;gap:0;background:var(--surface2);border-radius:11px;padding:10px 12px}.mini .mitop{display:flex;align-items:center;gap:9px}
.mini .mie{font-size:15px;flex:0 0 auto}.mini .miname{font-size:11.5px;color:var(--label3);font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini .mipct{font-family:var(--fm);font-size:14px;font-weight:700;flex:0 0 auto}.mini .mipct.green{color:var(--t-green)}.mini .mipct.amber{color:var(--t-amber)}.mini .mipct.empty{color:var(--label4)}
.incrow{display:flex;justify-content:space-between;align-items:center;padding:10px 2px}.incrow+.incrow{border-top:1px solid var(--sep)}
.incl{font-size:13px;color:var(--label2);font-weight:600}
.incv{font-family:var(--fm);font-size:16px;font-weight:700;color:var(--t-orange);font-variant-numeric:tabular-nums}
.incv.name{font-family:var(--fd);font-size:14px;color:var(--label2)}
.accbtn.wide{grid-column:1/-1}
.accbtns{display:flex;flex-direction:column;gap:9px;margin-top:16px}
.accbtn{display:flex;align-items:center;width:100%;border:1px solid var(--sep);background:var(--surface2);border-radius:13px;padding:14px 15px;font-family:var(--fd);font-size:14.5px;font-weight:700;color:var(--label);cursor:pointer;transition:.15s}.accbtn:active{transform:scale(.99)}
.accbtn small{margin-left:8px;color:var(--label3);font-weight:500;font-size:12px}
.accbtn .ac{margin-left:auto;color:var(--label4);font-size:18px}
.backb{border:none;background:none;color:var(--t-blue);font-family:var(--fd);font-size:14px;font-weight:600;cursor:pointer;padding:2px 0 0;margin-bottom:12px}
.gtecard{display:flex;align-items:center;gap:12px;background:var(--tint);border-radius:13px;padding:13px 14px;margin-bottom:14px}
.gteava{width:40px;height:40px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;font-size:13px;font-weight:800;font-family:var(--fm);background:rgba(175,82,222,.18);color:#C97BE8}
.phone[data-theme="light"] .gteava{background:rgba(140,60,180,.14);color:#7B2E9E}
.gtemeta{flex:1;min-width:0;display:flex;flex-direction:column}.gten{font-size:14.5px;font-weight:700;letter-spacing:-.2px}.gterole{font-size:11px;color:var(--label3);font-weight:500;margin-top:2px}
.gtecom{font-family:var(--fm);font-size:17px;font-weight:700;color:var(--t-orange);font-variant-numeric:tabular-nums}
.aselab{font-size:12px;color:var(--label3);font-weight:600;display:flex;justify-content:space-between;margin:0 2px 8px}
.aselab b{color:var(--label2);font-family:var(--fm)}
.aslist{display:flex;flex-direction:column;gap:7px}
.asrow{display:flex;align-items:center;gap:11px;background:var(--surface2);border-radius:12px;padding:10px 12px}
.asav{width:32px;height:32px;border-radius:9px;flex:0 0 auto;display:grid;place-items:center;font-size:11px;font-weight:800;font-family:var(--fm);background:rgba(0,168,224,.16);color:var(--t-blue)}
.asav.dim{background:var(--surface3);color:var(--label4)}
.asmeta{flex:1;min-width:0;display:flex;flex-direction:column}.asn{font-size:13.5px;font-weight:600;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ass{font-size:10.5px;color:var(--label3);margin-top:1px}
.ascom{font-family:var(--fm);font-size:13.5px;font-weight:700;color:var(--t-orange);font-variant-numeric:tabular-nums}.ascom.z{color:var(--label4)}
.bonohint{font-size:10.5px;color:var(--label4);line-height:1.4;margin-top:12px;text-align:center}
.hide{display:none !important}
@media (prefers-reduced-motion:reduce){*{transition:none !important}}
/* ===== drill-down ===== */
.shead{display:flex;align-items:center;gap:10px}
.navback{display:none;align-items:center;justify-content:center;width:30px;height:30px;border:none;background:var(--surface2);border-radius:9px;color:var(--label);font-size:21px;line-height:1;cursor:pointer;flex:none}
.shtitle{flex:1;min-width:0;display:flex;flex-direction:column}
.shtitle h2{margin:0;font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.15}
.shrole{font-size:11.5px;color:var(--label3);font-weight:500;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#navBody{overflow-y:auto;max-height:calc(86vh - 64px);-webkit-overflow-scrolling:touch}
.navpad{padding:14px 16px 22px}
.bhero{background:linear-gradient(135deg,var(--blue),#0066A6);border-radius:16px;padding:18px;color:#fff;margin-bottom:15px;box-shadow:0 6px 18px rgba(0,120,180,.28)}
.bhero.ase{background:linear-gradient(135deg,var(--green),#178A3C);box-shadow:0 6px 18px rgba(40,160,80,.28)}
.bhl{font-size:12.5px;font-weight:600;opacity:.95}
.bhv{font-size:34px;font-weight:800;letter-spacing:-1.2px;font-variant-numeric:tabular-nums;margin:3px 0;line-height:1}
.bhs{font-size:12px;opacity:.92}
.bchip{font-family:var(--fm);font-size:14.5px;font-weight:700;color:var(--t-green);font-variant-numeric:tabular-nums;flex:none}
.bchip.off{color:var(--label4)}
.drow{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:transparent;border-bottom:.5px solid var(--sep);padding:11px 2px;cursor:pointer;font-family:inherit}
.drow:last-child{border-bottom:none}
.drow:active{background:var(--surface2)}
.drow .asmeta{flex:1;min-width:0;display:flex;flex-direction:column}
.drow .asn{font-size:14.5px;font-weight:600;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drow .ass{font-size:12px;color:var(--label3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drow .tchev{flex:none;color:var(--label4);font-size:18px}
.sechint{font-weight:500;color:var(--label3);font-size:11px;text-transform:none;letter-spacing:0;float:right}
.vempty{color:var(--label3);font-size:13px;padding:14px 4px;text-align:center;background:var(--surface2);border-radius:12px}
.vrow{display:flex;align-items:center;gap:11px;padding:10px 2px;border-bottom:.5px solid var(--sep)}
.vrow:last-child{border-bottom:none}
.vchip{font-size:10px;font-weight:700;padding:4px 8px;border-radius:7px;flex:none}
.vchip.nv{background:rgba(0,168,224,.16);color:var(--t-blue)}
.vchip.rn{background:rgba(255,159,10,.16);color:var(--t-orange)}
/* ===== resumen ejecutivo + alertas (features 1-3) ===== */
.exec{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 16px;margin:2px 0 12px}
.ecard{background:var(--surface);border:.5px solid var(--sep);border-radius:14px;padding:13px 14px}
.ecard .el{font-size:11px;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:.3px}
.ecard .ev{font-size:23px;font-weight:800;letter-spacing:-.8px;font-variant-numeric:tabular-nums;color:var(--label);margin:3px 0 1px;line-height:1}
.ecard .es{font-size:11px;color:var(--label3)}
.alertbar{display:none;align-items:center;gap:9px;margin:0 16px 12px;padding:10px 13px;background:rgba(255,69,58,.12);border:.5px solid rgba(255,69,58,.32);border-radius:12px;font-size:12.5px;color:var(--t-red,#FF453A);font-weight:600}
.alertbar .aico{font-size:15px;flex:none}
.alertin{display:flex;align-items:flex-start;gap:8px;margin:10px 0 4px;padding:9px 11px;background:rgba(255,69,58,.1);border:.5px solid rgba(255,69,58,.28);border-radius:11px;font-size:12px;color:var(--t-red,#FF453A);font-weight:500;line-height:1.35}
.alertin span:first-child{flex:none}
.under{position:relative}
.under::before{content:"";position:absolute;left:-2px;top:6px;bottom:6px;width:3px;border-radius:2px;background:var(--t-red,#FF453A)}
.ubadge{font-size:9.5px;font-weight:700;color:var(--t-red,#FF453A);background:rgba(255,69,58,.14);padding:2px 6px;border-radius:6px;margin-left:6px;text-transform:uppercase;letter-spacing:.2px;vertical-align:middle}
.bhero.lock{background:linear-gradient(135deg,#8A8A8E,#636366);box-shadow:0 6px 18px rgba(0,0,0,.18)}
/* ===== bloque de alcance: % + avance/cuota ===== */
.alcbox{display:flex;flex-direction:column;align-items:flex-end;flex:none;min-width:52px;gap:1px}
.alcpct{font-family:var(--fm);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.05}
.alcpct.green{color:var(--t-green)}
.alcpct.amber{color:var(--t-amber)}
.alcpct.empty{color:var(--label4)}
.alcnum{font-family:var(--fm);font-size:10.5px;color:var(--label3);font-variant-numeric:tabular-nums;white-space:nowrap}

const alc=(real,cuota)=>cuota>0?Math.min(real/cuota,1):null;
const cls=a=>a==null?'empty':a>=0.80?'green':'amber';

function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
const rng=s=>mulberry32(hashStr(s));
const ini2=s=>s.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

/* métricas completas de la tienda (deterministas) para el bono del gerente */
function metricasTienda(key,t){
  if(t._m)return t._m;
  const r=rng('met|'+key);
  const po=alc(t.po,t.cpo);
  const around=(b,lo,hi,sp)=>b==null?null:Math.round(Math.max(lo,Math.min(hi,b+(-sp+r()*sp*2)))*100)/100;
  const m={po,re:around(po,.55,1.08,.12),ac:around(po,.55,1.15,.14),se:around(po,.45,1.08,.16),pre:around(po,.55,1.08,.12),
    mix:Math.round((.50+r()*.30)*100)/100,arpu:Math.round(580+r()*180),attach:Math.round((.55+r()*.30)*100)/100};
  t._m=m;return m;
}
/* bono del gerente: candado 80% pospago, base + incentivos, con qué le falta */
function bonoGerente(t,m){
  if(m.po==null) return {total:0,base:0,arpu:0,acc:0,locked:true,falta:['Asignar cuota a la tienda']};
  if(m.po<0.80) return {total:0,base:0,arpu:0,acc:0,locked:true,falta:['Subir pospago al 80% — es el candado principal, sin él no se libera nada']};
  const base=Math.min(Math.round(t.po*(m.po>=1?95:60)/100)*100,18000);
  let arpu=0; if(m.po>=1&&m.arpu>=660) arpu=1100; else if(m.arpu>=630) arpu=600;
  let acc=0; if(m.attach>=0.65) acc=800;
  const total=Math.min(base+arpu+acc,20000);
  const falta=[];
  if(m.arpu<630) falta.push('ARPU a $630 para el incentivo (+$600)');
  else if(m.po<1||m.arpu<660) falta.push('Pospago 100% y ARPU $660 para el incentivo mayor (+$1,100)');
  if(m.attach<0.65) falta.push('Attach de accesorios a 65% (+$800)');
  if(m.re<0.80) falta.push('Renovaciones a 80%');
  if(m.mix<0.60) falta.push('Mix de equipo nuevo a 60%');
  if(m.se<0.80||m.ac<0.80||m.pre<0.80) falta.push('Accesorios, seguros y prepago todos al 80%');
  return {total,base,arpu,acc,locked:false,falta};
}
/* tiendas de una zona (reales o generadas) con bono del gerente */
function genTiendas(key,z){
  if(z._t)return z._t;
  let base=[];
  if(z.tiendas){base=z.tiendas.map(t=>({ini:t[0],n:t[1],gte:t[2],po:t[3],cpo:t[4]}));}
  else{const r=rng(key);for(let i=0;i<z.tiendas_n;i++){const n=PLAZAS[Math.floor(r()*PLAZAS.length)]+' '+TIPOS[Math.floor(r()*TIPOS.length)];const cpo=Math.floor(80+r()*100),po=Math.floor(cpo*(0.74+r()*0.30));const gte=NOMS[Math.floor(r()*NOMS.length)]+' '+APES[Math.floor(r()*APES.length)];base.push({ini:ini2(n),n,gte,po,cpo});}}
  base.forEach(t=>{
    const m=metricasTienda(key+'/'+t.ini,t);t.bono=bonoGerente(t,m).total;
    const rr=rng('q|'+key+'/'+t.ini),al=()=>0.74+rr()*0.28;
    if(t.cpo>0){const cu={po:t.cpo,re:Math.round(t.cpo*(.32+rr()*.10)),ac:Math.round(t.cpo*(1.5+rr()*.40)),se:Math.round(t.cpo*(.60+rr()*.18)),pr:Math.round(t.cpo*(.40+rr()*.15))};
      t.cuota=cu;t.real={po:t.po,re:Math.round(cu.re*al()),ac:Math.round(cu.ac*al()),se:Math.round(cu.se*al()),pr:Math.round(cu.pr*al())};}
    else{t.cuota={po:0,re:0,ac:0,se:0,pr:0};const n=Math.round(55+rr()*55);
      t.real={po:t.po,re:Math.round(n*.34),ac:Math.round(n*1.6),se:Math.round(n*.64),pr:Math.round(n*.45)};}
  });
  z._t=base;return base;
}
/* asesores: comisión DERIVADA de sus ventas, con candado de 2 pospagos + tienda 80% */
function genAsesores(key,t){
  if(t._a)return t._a;
  const r=rng('ase|'+key);
  const m=metricasTienda(key,t),libera=m.po!=null&&m.po>=0.80;
  const n=4+Math.floor(r()*4);let arr=[];
  for(let i=0;i<n;i++){
    const nom=NOMS[Math.floor(r()*NOMS.length)]+' '+APES[Math.floor(r()*APES.length)];
    const po=Math.floor(r()*7),re=Math.floor(r()*5),ac=Math.floor(r()*10),se=Math.floor(r()*6);
    const accede=(po>=2)&&libera;               // candado: mín 2 pospagos del asesor Y tienda al 80%
    const comPlan=po*180+re*95,comEq=po*250,comAcc=ac*40,comSeg=se*120;
    const comGen=comPlan+comEq+comAcc+comSeg;    // lo que generaría
    const com=accede?comGen:0;                   // SOLO cobra si accede; si no, $0
    arr.push({n:nom,ini:ini2(nom),po,re,ac,se,com,comGen,comPlan,comEq,comAcc,comSeg,accede,noAcc:!accede,libera});
  }
  arr.sort((a,b)=>b.com-a.com);t._a=arr;return arr;
}
/* ventas de la semana: pospago, renovación, accesorios y seguros */
function genVentas(key,as){
  const r=rng('v|'+key);let arr=[];
  for(let i=0;i<as.po;i++)arr.push({cls:'nv',tag:'Pospago',nm:EQUIPOS[Math.floor(r()*EQUIPOS.length)],sub:'Plan '+PLANES_V[Math.floor(r()*PLANES_V.length)],com:Math.round(150+r()*250)});
  for(let i=0;i<as.re;i++)arr.push({cls:'rn',tag:'Renov',nm:EQUIPOS[Math.floor(r()*EQUIPOS.length)],sub:'Plan '+PLANES_V[Math.floor(r()*PLANES_V.length)],com:Math.round(90+r()*150)});
  for(let i=0;i<as.ac;i++)arr.push({cls:'ac',tag:'Acc',nm:ACCESORIOS[Math.floor(r()*ACCESORIOS.length)],sub:'Accesorio',com:Math.round(25+r()*55)});
  for(let i=0;i<as.se;i++)arr.push({cls:'sg',tag:'Seguro',nm:SEGUROS[Math.floor(r()*SEGUROS.length)],sub:'Protección',com:Math.round(90+r()*150)});
  return arr;
}

function alcChip(real,cuota){const a=alc(real,cuota),c=cls(a);if(a==null)return '<span class="alcbox"><span class="alcpct empty">—</span><span class="alcnum">sin cuota</span></span>';return `<span class="alcbox"><span class="alcpct ${c}">${Math.round(a*100)}%</span><span class="alcnum">${real} / ${cuota}</span></span>`;}
function minisHTML(o){return MET.slice(1).map(m=>{const av=alc(o.real[m.k],o.cuota[m.k]),cc=cls(av);const num=o.cuota[m.k]>0?o.real[m.k]+' / '+o.cuota[m.k]:'—';return `<div class="mini"><div class="mitop"><span class="mie">${m.e}</span><span class="miname">${m.label}</span><span class="mipct ${cc}">${av==null?'—':Math.round(av*100)+'%'}</span></div><span class="minum">${num}</span></div>`;}).join('');}

let nav=[];
function pushNav(type,data,key){nav.push({type,data,key});document.getElementById('scrim').classList.add('on');document.getElementById('sheet').classList.add('on');renderNav();}
function backNav(){nav.pop();if(!nav.length){closeSheetReset();}else renderNav();}
function closeSheetReset(){nav=[];document.getElementById('scrim').classList.remove('on');document.getElementById('sheet').classList.remove('on');}
function enterMain(i){const o=SCOPE[i];if(MAINTYPE==='tienda'){pushNav('tienda',o,SCOPE_PREFIX+o.ini);}else{pushNav(MAINTYPE,o,MAINTYPE==='region'?o.ini:SCOPE_PREFIX+o.ini);}}
function openChild(i){
  const v=nav[nav.length-1];
  if(v.type==='region'){const z=v.data.zonas[i];pushNav('zona',z,v.data.ini+'/'+z.ini);}
  else if(v.type==='zona'){const t=genTiendas(v.key,v.data)[i];pushNav('tienda',t,v.key+'/'+t.ini);}
  else if(v.type==='tienda'){const a=genAsesores(v.key,v.data)[i];pushNav('asesor',a,v.key+'/'+a.ini);}
}
function openGerente(){const v=nav[nav.length-1];if(v.type==='tienda')pushNav('gerente',v.data,v.key);}
function openCuota(){const v=nav[nav.length-1];if(v.type==='tienda')pushNav('cuota',v.data,v.key);}
function viewCuota(t,key){
  let h='<div class="navpad">';
  h+='<p class="seclab">Cuota de la tienda · el gerente propone, tú ajustas</p><div class="qwrap">';
  MET.forEach(m=>{const real=t.real?t.real[m.k]:0,cu=t.cuota?t.cuota[m.k]:0,a=alc(real,cu),c=cls(a),p=a==null?0:Math.round(a*100);
    h+=`<div class="qrow"><div class="qtop"><span class="qlab">${m.e} ${m.label}</span><span class="qin"><label>cuota</label><input type="number" inputmode="numeric" data-k="${m.k}" value="${cu||''}" placeholder="0" oninput="recalcQ(this)"></span></div><div class="qbot" data-q="${m.k}"><span class="qreal">lleva ${real}</span><span class="qbar"><span class="qf ${c}" style="width:${p}%"></span></span><span class="qpct ${c}">${a==null?'sin cuota':p+'%'}</span></div></div>`;});
  h+='</div>';
  h+='<button class="savebtn" onclick="guardarCuota()">Guardar cuota</button>';
  h+='<p class="qhint">La barra es lo que la tienda lleva vendido contra su cuota. Al guardar se actualiza el avance de toda tu zona.</p>';
  h+='</div>';return h;
}
function recalcQ(inp){const v=nav[nav.length-1],t=v.data,k=inp.dataset.k,cu=parseFloat(inp.value)||0,real=t.real?t.real[k]:0,a=alc(real,cu),c=cls(a),p=a==null?0:Math.round(a*100);document.querySelector('.qbot[data-q="'+k+'"]').innerHTML=`<span class="qreal">lleva ${real}</span><span class="qbar"><span class="qf ${c}" style="width:${p}%"></span></span><span class="qpct ${c}">${a==null?'sin cuota':p+'%'}</span>`;}
function guardarCuota(){
  const v=nav[nav.length-1],t=v.data,c={};
  document.querySelectorAll('.qrow input').forEach(inp=>{c[inp.dataset.k]=parseFloat(inp.value)||0;});
  t.cuota=c;t.cpo=c.po;t._m=null;t._a=null;
  const m=metricasTienda(v.key,t);t.bono=bonoGerente(t,m).total;
  renderTiles();renderMain();backNav();
}
const ROLE={region:'Dirección regional',zona:'Gerente regional',tienda:'Tienda',asesor:'Asesor',gerente:'Bono del gerente',cuota:'Ajustar cuota'};
function renderNav(){
  const v=nav[nav.length-1];
  document.getElementById('shAva').textContent=(v.type==='gerente')?ini2(v.data.gte):(v.data.ini||ini2(v.data.n));
  document.getElementById('shName').textContent=(v.type==='region'?'Región ':'')+((v.type==='gerente')?v.data.gte:v.data.n);
  document.getElementById('shRole').textContent=v.type==='tienda'?('Gerente · '+v.data.gte):(v.type==='gerente'?('Gerente · '+v.data.n):ROLE[v.type]);
  document.getElementById('navBack').style.display=nav.length>1?'flex':'none';
  let body;
  if(v.type==='region')body=viewRegion(v.data);
  else if(v.type==='zona')body=viewZona(v.data,v.key);
  else if(v.type==='tienda')body=viewTienda(v.data,v.key);
  else if(v.type==='gerente')body=viewGerente(v.data,v.key);
  else if(v.type==='cuota')body=viewCuota(v.data,v.key);
  else body=viewAsesor(v.data,v.key);
  document.getElementById('navBody').innerHTML=body;
  document.getElementById('navBody').scrollTop=0;
}
function viewRegion(r){
  const a=alc(r.real.po,r.cuota.po),c=cls(a);
  let h='<div class="navpad">';
  h+=`<div class="candbig"><span class="cbl">🔒 Pospago de la región</span><span class="cbv ${c}">${r.real.po} / ${r.cuota.po} · ${Math.round(a*100)}%</span></div>`;
  h+='<p class="seclab">Indicadores</p><div class="minis">'+minisHTML(r)+'</div>';
  h+=`<div class="incrow"><span class="incl">Director regional</span><span class="incv name">${r.dir}</span></div>`;
  h+=`<p class="seclab">Zonas · ${r.zonas_n}</p><div class="aslist">`;
  r.zonas.forEach((z,i)=>{h+=`<button class="drow" onclick="openChild(${i})"><span class="asav">${z.ini}</span><span class="asmeta"><span class="asn">${z.n}</span><span class="ass">${z.tiendas_n} tiendas</span></span>${alcChip(z.real.po,z.cuota.po)}<span class="tchev">›</span></button>`;});
  h+='</div></div>';return h;
}
function viewZona(z,key){
  const a=alc(z.real.po,z.cuota.po),c=cls(a),ts=genTiendas(key,z);
  let h='<div class="navpad">';
  h+=`<div class="candbig"><span class="cbl">🔒 Pospago de la zona</span><span class="cbv ${c}">${z.real.po} / ${z.cuota.po} · ${Math.round(a*100)}%</span></div>`;
  h+='<p class="seclab">Indicadores</p><div class="minis">'+minisHTML(z)+'</div>';
  h+=`<p class="seclab">Tiendas · ${ts.length} <span class="sechint">bono del gerente</span></p><div class="aslist">`;
  ts.forEach((t,i)=>{const ta=alc(t.po,t.cpo),right=`<span class="alcbox"><span class="bchip${t.bono>0?'':' off'}">$${fmt(t.bono)}</span><span class="alcnum">${t.cpo>0?t.po+' / '+t.cpo+' · '+Math.round(ta*100)+'%':'sin cuota'}</span></span>`;h+=`<button class="drow" onclick="openChild(${i})"><span class="asav">${t.ini}</span><span class="asmeta"><span class="asn">${t.n}</span><span class="ass">${t.gte}</span></span>${right}<span class="tchev">›</span></button>`;});
  h+='</div></div>';return h;
}
function viewTienda(t,key){
  const m=metricasTienda(key,t),bg=bonoGerente(t,m),ases=genAsesores(key,t),tot=ases.reduce((s,x)=>s+x.com,0);
  let h='<div class="navpad">';
  h+=`<div class="bhero ${bg.locked?'lock':''}"><div class="bhl">🏆 Bono del gerente</div><div class="bhv">$${fmt(bg.total)}</div><div class="bhs">${t.gte} · ${t.cpo>0?t.po+' / '+t.cpo+' · '+Math.round(m.po*100)+'% pospago':'sin cuota'}</div></div>`;
  h+=`<button class="gbtn" onclick="openGerente()"><span>📊 Cómo cobra y qué le falta</span><span class="ac">›</span></button>`;
  if(CAN_EDIT_CUOTA)h+=`<button class="gbtn" onclick="openCuota()"><span>🎯 Ajustar la cuota de la tienda</span><span class="ac">›</span></button>`;
  h+=`<p class="seclab">Asesores · ${ases.length} <span class="sechint">$${fmt(tot)} en comisiones</span></p><div class="aslist">`;
  ases.forEach((as,i)=>{h+=`<button class="drow" onclick="openChild(${i})"><span class="asav">${as.ini}</span><span class="asmeta"><span class="asn">${as.n}</span><span class="ass">${as.po} pos · ${as.re} renov · ${as.ac} acc · ${as.se} seg</span></span><span class="ascom">$${fmt(as.com)}</span><span class="tchev">›</span></button>`;});
  h+='</div></div>';return h;
}
function viewGerente(t,key){
  const m=metricasTienda(key,t),bg=bonoGerente(t,m);
  let h='<div class="navpad">';
  h+=`<div class="bhero ${bg.locked?'lock':''}"><div class="bhl">🏆 Bono actual del gerente</div><div class="bhv">$${fmt(bg.total)}</div><div class="bhs">${t.gte}${t.cpo>0?' · '+Math.round(m.po*100)+'% pospago':' · sin cuota'}</div></div>`;
  h+='<p class="seclab">De qué se compone</p><div class="brk">';
  h+=`<div class="brkrow"><span>Base por pospago / renovación</span><b>$${fmt(bg.base)}</b></div>`;
  h+=`<div class="brkrow"><span>Incentivo ARPU-Mix</span><b class="${bg.arpu>0?'pos':'z'}">${bg.arpu>0?'$'+fmt(bg.arpu):'$0'}</b></div>`;
  h+=`<div class="brkrow"><span>Incentivo de accesorios</span><b class="${bg.acc>0?'pos':'z'}">${bg.acc>0?'$'+fmt(bg.acc):'$0'}</b></div>`;
  h+='</div>';
  h+='<p class="seclab">Sus indicadores</p><div class="gmet">';
  const cell=(lab,val,ok)=>`<div class="gm ${ok?'ok':'no'}"><span class="gml">${lab}</span><span class="gmv">${val}</span><span class="gmck">${ok?'✓':'✗'}</span></div>`;
  h+=cell('Pospago',m.po!=null?Math.round(m.po*100)+'%':'—',m.po!=null&&m.po>=0.80);
  h+=cell('Renovaciones',Math.round(m.re*100)+'%',m.re>=0.80);
  h+=cell('Mix equipo',Math.round(m.mix*100)+'%',m.mix>=0.60);
  h+=cell('Attach acc.',Math.round(m.attach*100)+'%',m.attach>=0.65);
  h+=cell('ARPU','$'+m.arpu,m.arpu>=630);
  h+=cell('Seguros',Math.round(m.se*100)+'%',m.se>=0.80);
  h+='</div>';
  h+='<p class="seclab">Para cobrar todo le falta</p>';
  if(!bg.falta.length)h+='<div class="okbox">✅ Está cobrando el máximo posible.</div>';
  else{h+='<div class="falist">';bg.falta.forEach(x=>h+=`<div class="farow"><span class="fadot"></span><span>${x}</span></div>`);h+='</div>';}
  h+='</div>';return h;
}
function viewAsesor(as,key){
  const vs=genVentas(key,as);
  let h='<div class="navpad">';
  h+=`<div class="bhero ase ${as.noAcc?'lock':''}"><div class="bhl">💰 Comisión del asesor</div><div class="bhv">$${fmt(as.com)}</div><div class="bhs">${as.po} pospago · ${as.re} renov · ${as.ac} acc · ${as.se} seg</div></div>`;
  if(as.noAcc)h+=`<div class="alertin"><span>🔒</span><span>${as.po<2?('Lleva '+as.po+' pospago'+(as.po===1?'':'s')+': necesita mínimo 2 para cobrar comisión.'):('La tienda está bajo el 80% de pospago: no se libera comisión.')} Generaría $${fmt(as.comGen)} al desbloquear.</span></div>`;
  h+=`<p class="seclab">${as.noAcc?'Generaría al desbloquear (bloqueado)':'De qué se compone'}</p><div class="brk">`;
  h+=`<div class="brkrow"><span>Plan (pospago + renovación)</span><b class="${as.noAcc?'z':''}">$${fmt(as.comPlan)}</b></div>`;
  h+=`<div class="brkrow"><span>Incentivo de equipo</span><b class="${(as.noAcc||as.comEq===0)?'z':'pos'}">$${fmt(as.comEq)}</b></div>`;
  h+=`<div class="brkrow"><span>Accesorios</span><b class="${(as.noAcc||as.comAcc===0)?'z':'pos'}">$${fmt(as.comAcc)}</b></div>`;
  h+=`<div class="brkrow"><span>Seguros</span><b class="${(as.noAcc||as.comSeg===0)?'z':'pos'}">$${fmt(as.comSeg)}</b></div>`;
  h+='</div>';
  h+=`<p class="seclab">Ventas de la semana · ${vs.length}</p>`;
  if(!vs.length)h+='<div class="vempty">Sin ventas esta semana.</div>';
  else{h+='<div class="aslist">';vs.forEach(v=>{h+=`<div class="vrow"><span class="vchip ${v.cls}">${v.tag}</span><span class="asmeta"><span class="asn">${v.nm}</span><span class="ass">${v.sub}</span></span><span class="ascom">$${fmt(v.com)}</span></div>`;});h+='</div>';}
  h+='</div>';return h;
}
function aggMetric(k,arr){arr=arr||SCOPE;let r=0,c=0;arr.forEach(o=>{if(o.cuota&&o.cuota[k]>0){r+=o.real[k];c+=o.cuota[k];}});return c>0?{a:Math.min(r/c,1),r,c}:null;}
function renderTiles(){
  const src=AGG?[AGG]:SCOPE;
  const tile=(m,lock)=>{const ag=aggMetric(m.k,src),c=cls(ag?ag.a:null),pc=ag?Math.round(ag.a*100):0;const sub=ag?`<div class="tisub">${fmt(ag.r)} / ${fmt(ag.c)}${m.k==='po'?' activaciones':''}</div>`:'';const lk=lock?'<span class="lock">🔒 desbloqueo</span>':'';return `<div class="tile ${lock?'full':''}"><div class="tih"><span>${m.e}</span>${m.label}${lk}</div><div class="tiv ${c}">${ag?pc+'%':'—'}</div><div class="tibar"><span class="tibarf ${c}" style="width:${pc}%"></span></div>${sub}</div>`;};
  document.getElementById('tiles').innerHTML=tile(MET[0],true)+tile(MET[1])+tile(MET[2])+tile(MET[3])+tile(MET[4]);
}
function renderMain(){
  if(MAINTYPE==='tienda'){
    document.getElementById('listWrap').innerHTML=SCOPE.map((t,i)=>{const ta=alc(t.po,t.cpo),right=`<span class="alcbox"><span class="bchip${t.bono>0?'':' off'}">$${fmt(t.bono)}</span><span class="alcnum">${t.cpo>0?t.po+' / '+t.cpo+' · '+Math.round(ta*100)+'%':'sin cuota'}</span></span>`;return `<button class="tbtn" onclick="enterMain(${i})"><span class="tava">${t.ini}</span><span class="tmeta"><span class="tn">${t.n}</span><span class="tsub">${t.gte}</span></span>${right}<span class="tchev">›</span></button>`;}).join('');
    document.getElementById('tdCnt').textContent=SCOPE.length+' tiendas';return;
  }
  document.getElementById('listWrap').innerHTML=SCOPE.map((o,i)=>{const sub=MAINTYPE==='region'?`${o.zonas_n} zonas`:`${o.tiendas_n} tiendas`;const pre=MAINTYPE==='region'?'Región ':'';return `<button class="tbtn" onclick="enterMain(${i})"><span class="tava">${o.ini}</span><span class="tmeta"><span class="tn">${pre}${o.n}</span><span class="tsub">${sub}</span></span>${alcChip(o.real.po,o.cuota.po)}<span class="tchev">›</span></button>`;}).join('');
  document.getElementById('tdCnt').textContent=SCOPE.length+(MAINTYPE==='region'?' regiones':' zonas');
}
let SCOPE,MAINTYPE,SCOPE_PREFIX='',AGG=null,CAN_EDIT_CUOTA=false;
function initDashboard(scope,maintype,prefix,agg,canEdit){SCOPE=scope;MAINTYPE=maintype;SCOPE_PREFIX=prefix||'';AGG=agg||null;CAN_EDIT_CUOTA=!!canEdit;renderTiles();renderMain();}
function toggleTheme(){const p=document.querySelector('.phone');const isLight=p.getAttribute('data-theme')==='light';p.setAttribute('data-theme',isLight?'dark':'light');document.getElementById('themeBtn').textContent=isLight?'☀️':'🌙';}
document.getElementById('weeks').addEventListener('click',e=>{const b=e.target.closest('.wk');if(!b)return;[...e.currentTarget.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');});

initDashboard(ORG,'region');
</script>
</body>
</html>
