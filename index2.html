<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TechGuide">
<meta name="theme-color" content="#00A8E0">
<meta name="description" content="AT&T TechGuide — Fichas técnicas para fuerza de ventas">
<title>TechGuide · AT&T</title>
<link rel="manifest" href="manifest.json">
<!-- Apple touch icons -->
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ios-blue:#007AFF;--ios-green:#34C759;--ios-orange:#FF9500;--ios-purple:#AF52DE;
  --ios-red:#FF3B30;--ios-teal:#30B0C7;
  --bg:#F2F2F7;--surface:#FFFFFF;--surface2:#F2F2F7;
  --label:#1C1C1E;--label2:#3C3C43;--label3:#8E8E93;--label4:#C7C7CC;
  --sep:rgba(60,60,67,0.12);
  --r-xl:20px;--r-lg:16px;--r-md:12px;--r-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--label);overscroll-behavior:none}

/* ── APP SHELL ── */
#app{height:100%;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* ── NAV BAR ── */
.nav{
  background:rgba(242,242,247,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:0.5px solid var(--sep);
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;min-height:54px;
  position:relative;z-index:50;
}
.nav-back{display:flex;align-items:center;gap:3px;color:var(--ios-blue);font-size:17px;background:none;border:none;cursor:pointer;padding:4px 0;flex-shrink:0}
.nav-back svg{width:9px;height:15px;flex-shrink:0}
.nav-title{font-size:17px;font-weight:600;color:var(--label);position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap}
.nav-right{margin-left:auto;color:var(--ios-blue);font-size:15px;font-weight:500;background:none;border:none;cursor:pointer;padding:4px 0;white-space:nowrap;flex-shrink:0}
.nav-right.on{font-weight:700}

/* ── HOME SCREEN ── */
.home-hero{
  background:#1C1C1E;
  padding:calc(var(--safe-top) + 20px) 20px 24px;
  flex-shrink:0;
}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:#00A8E0;color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.4px;margin-bottom:14px}
.hero-title{font-size:32px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:6px;letter-spacing:-.5px}
.hero-sub{font-size:14px;color:rgba(255,255,255,0.5)}

.home-content{padding:20px 16px calc(var(--safe-bot) + 20px)}
.sec-label{font-size:13px;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}

.os-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.os-btn{
  background:var(--surface);border-radius:var(--r-xl);
  padding:18px 14px 16px;border:none;cursor:pointer;
  text-align:left;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  transition:transform .1s ease;
  position:relative;overflow:hidden;
}
.os-btn:active{transform:scale(0.96)}
.os-btn-ios{border-top:3px solid #1C1C1E}
.os-btn-and{border-top:3px solid #3DDC84}
.os-logo-wrap{width:40px;height:40px;margin-bottom:10px;display:flex;align-items:center;justify-content:center}
.os-btn-name{font-size:16px;font-weight:700;color:var(--label);margin-bottom:2px}
.os-btn-count{font-size:12px;color:var(--label3)}
.os-chevron{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--label4);font-size:18px}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--r-lg);padding:10px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-num{font-size:20px;font-weight:700;color:var(--label)}
.stat-lbl{font-size:10px;color:var(--label3);margin-top:2px;line-height:1.3}

.legend-box{background:var(--surface);border-radius:var(--r-lg);padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.legend-items{display:flex;flex-wrap:wrap;gap:10px 18px}
.leg{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--label2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── CATALOG ── */
.sticky-search{
  background:rgba(242,242,247,0.95);
  backdrop-filter:blur(20px);
  padding:8px 16px;
  border-bottom:0.5px solid var(--sep);
  flex-shrink:0;
}
.search-box{display:flex;align-items:center;gap:7px;background:rgba(116,116,128,0.12);border-radius:10px;padding:7px 11px}
.search-box svg{width:14px;height:14px;flex-shrink:0;color:var(--label3)}
.search-box input{background:none;border:none;outline:none;font-size:15px;color:var(--label);width:100%;font-family:inherit}
.search-box input::placeholder{color:var(--label3)}

.filter-scroll{
  background:rgba(242,242,247,0.95);
  backdrop-filter:blur(20px);
  display:flex;gap:6px;padding:7px 16px 5px;
  overflow-x:auto;scrollbar-width:none;
  border-bottom:0.5px solid var(--sep);
  flex-shrink:0;
}
.filter-scroll::-webkit-scrollbar{display:none}
.fpill{flex-shrink:0;padding:5px 13px;font-size:13px;font-weight:500;border-radius:20px;cursor:pointer;white-space:nowrap;background:var(--surface);color:var(--label2);border:0.5px solid rgba(0,0,0,.1);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.fpill.on{background:var(--ios-blue);color:#fff;border-color:var(--ios-blue)}

/* DEVICE GRID */
.d-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px 12px calc(var(--safe-bot) + 80px)}
.d-card{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.07);transition:transform .1s}
.d-card:active{transform:scale(0.97)}
.d-img-wrap{aspect-ratio:.82;background:#F2F2F7;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.d-img{width:76%;height:76%;object-fit:contain}
.d-dot{position:absolute;top:8px;left:8px;width:8px;height:8px;border-radius:50%;border:1.5px solid #fff}
.d-cmp{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.9);border:1.5px solid var(--label4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.d-cmp.sel{background:var(--ios-blue);border-color:var(--ios-blue);color:#fff}
.d-info{padding:7px 9px 9px}
.d-name{font-size:11px;font-weight:600;color:var(--label);line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-row2{display:flex;align-items:center;justify-content:space-between;gap:3px}
.d-brand{font-size:10px;color:var(--label3)}
.b-bun{font-size:8px;font-weight:600;color:#7B2FBE;background:#F5EEFF;border-radius:4px;padding:1px 4px}
.b-2s{font-size:8px;color:var(--label3);background:var(--bg);border-radius:4px;padding:1px 4px}
.dot-r{background:#34C759}.dot-l{background:#FF9500}.dot-n{background:var(--ios-blue)}

/* DEVICE LIST */
.d-list{display:flex;flex-direction:column;gap:8px;padding:10px 16px calc(var(--safe-bot) + 80px)}
.d-row{display:flex;align-items:center;gap:11px;background:var(--surface);border-radius:var(--r-lg);padding:10px 13px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .1s}
.d-row:active{transform:scale(0.98)}
.d-row-img{width:46px;height:46px;flex-shrink:0;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.d-row-img img{width:88%;height:88%;object-fit:contain}
.d-row-info{flex:1;min-width:0}
.d-row-name{font-size:13px;font-weight:600;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-row-sub{font-size:11px;color:var(--label3);margin-top:2px}
.d-row-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.bs{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.bs-r{background:#E8F9EE;color:#1D6A35}.bs-l{background:#FFF3E0;color:#7A4100}.bs-n{background:#E8F0FF;color:#003FA5}
.d-row-chev{color:var(--label4);font-size:17px}

/* CMP BAR */
.cmp-bar{
  display:none;align-items:center;gap:8px;
  padding:10px 16px calc(var(--safe-bot) + 10px);
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(20px);
  border-top:0.5px solid var(--sep);
  box-shadow:0 -2px 10px rgba(0,0,0,.08);
  flex-shrink:0;
}
.cmp-bar.vis{display:flex}
.cmp-bar-lbl{font-size:13px;color:var(--label2);flex:1}
.cmp-clear{font-size:14px;color:var(--ios-blue);background:none;border:none;cursor:pointer}
.cmp-go{background:var(--ios-blue);color:#fff;font-size:14px;font-weight:600;border:none;border-radius:12px;padding:8px 18px;cursor:pointer}

/* ── FICHA ── */
.ficha-hero{background:var(--surface);padding:16px;margin-bottom:8px}
.fh-inner{display:flex;gap:14px;align-items:flex-start}
.fh-img{width:90px;height:90px;flex-shrink:0;background:var(--bg);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;overflow:hidden}
.fh-img img{width:84%;height:84%;object-fit:contain}
.fh-meta{flex:1;min-width:0}
.fh-brand{font-size:11px;color:var(--label3);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.fh-name{font-size:19px;font-weight:700;color:var(--label);line-height:1.2;margin:3px 0 9px}
.fh-badges{display:flex;flex-wrap:wrap;gap:5px}
.fhb{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.fhb-r{background:#E8F9EE;color:#1D6A35}
.fhb-l{background:#FFF3E0;color:#7A4100}
.fhb-n{background:#E8F0FF;color:#003FA5}
.fhb-bun{background:#F5EEFF;color:#7B2FBE}
.fhb-2{background:var(--bg);color:var(--label3)}

.bundle-pill{margin:0 16px 8px;background:linear-gradient(135deg,#F5EEFF,#EDE0FF);border:.5px solid #D8B4FF;border-radius:var(--r-lg);padding:12px 14px}
.bp-head{font-size:11px;font-weight:700;color:#7B2FBE;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.bp-body{font-size:13px;color:#5B2189;font-weight:500}

.tab-bar{display:flex;background:var(--surface);border-bottom:0.5px solid var(--sep);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tab-bar::-webkit-scrollbar{display:none}
.tb{flex:1;padding:10px 6px;font-size:13px;font-weight:500;color:var(--label3);text-align:center;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-width:80px}
.tb.on{color:var(--ios-blue);border-bottom-color:var(--ios-blue);font-weight:600}
.tp{display:none}.tp.on{display:block}

.spec-card{background:var(--surface);border-radius:var(--r-lg);margin:10px 16px 0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.spec-head{font-size:11px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:.6px;padding:11px 14px 8px;border-bottom:0.5px solid var(--sep)}
.spec-r{display:flex;gap:8px;padding:8px 14px;border-bottom:0.5px solid var(--sep)}
.spec-r:last-child{border-bottom:none}
.spec-k{font-size:12px;color:var(--label3);width:36%;flex-shrink:0;line-height:1.4}
.spec-v{font-size:12px;color:var(--label);font-weight:500;flex:1;line-height:1.4}

.sell-card{background:var(--surface);border-radius:var(--r-lg);margin:10px 16px 0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sell-head{font-size:11px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:.6px;padding:11px 14px 8px;border-bottom:0.5px solid var(--sep)}
.sell-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--sep)}
.sell-item:last-child{border-bottom:none}
.sell-ico{width:28px;height:28px;border-radius:8px;background:#EEF4FF;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.sell-txt{font-size:12px;color:var(--label);line-height:1.5;flex:1}
.obj-item{padding:9px 14px;border-bottom:0.5px solid var(--sep)}
.obj-item:last-child{border-bottom:none}
.obj-q{font-size:11px;color:var(--label3);margin-bottom:3px}
.obj-a{font-size:12px;color:var(--label);line-height:1.5}

.tt-card{background:var(--surface);border-radius:var(--r-xl);margin:10px 16px 0;padding:28px 20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tt-logo{width:54px;height:54px;margin:0 auto 12px;border-radius:14px;overflow:hidden}
.tt-title{font-size:15px;font-weight:700;color:var(--label);margin-bottom:4px}
.tt-sub{font-size:12px;color:var(--label3);margin-bottom:18px;line-height:1.5}
.tt-btn{display:inline-flex;align-items:center;gap:7px;background:#010101;color:#fff;font-size:14px;font-weight:600;padding:11px 24px;border-radius:14px;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.22)}
.tt-btn:active{transform:scale(0.97)}
.tt-note{font-size:11px;color:var(--label4);margin-top:10px}

.act-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 16px calc(var(--safe-bot) + 20px)}
.act-btn{padding:13px;border-radius:var(--r-lg);border:none;cursor:pointer;font-size:13px;font-weight:600;text-align:center}
.act-btn:active{transform:scale(0.97)}
.act-tt{background:#010101;color:#fff}
.act-cmp{background:var(--ios-blue);color:#fff}

/* ── COMPARE ── */
.cmp-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bot) + 20px)}
.cmp-tbl{min-width:380px;width:100%;border-collapse:collapse}
.cmp-tbl th{padding:6px 8px;font-size:11px;font-weight:600;color:var(--label3);text-align:center;background:var(--bg);border-bottom:0.5px solid var(--sep)}
.cmp-tbl th:first-child{text-align:left;width:28%}
.cmp-th-img{width:52px;height:52px;object-fit:contain;margin:0 auto 4px;display:block}
.cmp-th-name{font-size:11px;font-weight:700;color:var(--label);line-height:1.3}
.cmp-th-brand{font-size:10px;color:var(--label3)}
.cmp-tbl td{padding:7px 8px;font-size:11px;color:var(--label);border-bottom:0.5px solid var(--sep);text-align:center;vertical-align:top;line-height:1.4;background:var(--surface)}
.cmp-tbl td:first-child{font-size:10px;color:var(--label3);text-transform:uppercase;letter-spacing:.3px;font-weight:500;text-align:left;background:#FAFAFA}
.no-r{text-align:center;padding:50px 20px;color:var(--label3);font-size:14px}

/* INSTALL PROMPT */
.install-banner{
  background:linear-gradient(135deg,#007AFF,#5856D6);
  color:#fff;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.install-banner.hidden{display:none}
.ib-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.ib-text{flex:1}
.ib-title{font-size:14px;font-weight:600}
.ib-sub{font-size:11px;opacity:.8;margin-top:2px}
.ib-btn{background:rgba(255,255,255,.25);border:none;color:#fff;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;white-space:nowrap}
.ib-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;padding:0 4px}

@media(min-width:600px){.d-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.d-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div id="app">

<!-- INSTALL BANNER -->
<div class="install-banner" id="install-banner">
  <div class="ib-icon">📲</div>
  <div class="ib-text">
    <div class="ib-title">Instalar TechGuide</div>
    <div class="ib-sub">Agregar a pantalla de inicio</div>
  </div>
  <button class="ib-btn" id="install-btn">Instalar</button>
  <button class="ib-close" onclick="hideBanner()">✕</button>
</div>

<!-- ── HOME ── -->
<div id="s-home" class="screen active">
  <div class="home-hero">
    <div class="hero-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      AT&T México
    </div>
    <div class="hero-title">TechGuide</div>
    <div class="hero-sub">Fichas técnicas · Fuerza de ventas</div>
  </div>
  <div class="scroll-area">
  <div class="home-content">
    <div class="sec-label">Selecciona plataforma</div>
    <div class="os-grid">
      <button class="os-btn os-btn-ios" onclick="showCatalog('ios')">
        <div class="os-logo-wrap">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.37 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" fill="#1C1C1E"/></svg>
        </div>
        <div class="os-btn-name">iOS</div>
        <div class="os-btn-count" id="ios-cnt">— equipos</div>
        <span class="os-chevron">›</span>
      </button>
      <button class="os-btn os-btn-and" onclick="showCatalog('android')">
        <div class="os-logo-wrap">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M6.18 15.64a2.18 2.18 0 01-2.18-2.18V9.19a2.18 2.18 0 014.36 0v4.27a2.18 2.18 0 01-2.18 2.18zm11.64 0a2.18 2.18 0 01-2.18-2.18V9.19a2.18 2.18 0 014.36 0v4.27a2.18 2.18 0 01-2.18 2.18zM4.82 8.78h14.36a.55.55 0 01.55.55v6.54a4.36 4.36 0 01-4.36 4.36H9.63a4.36 4.36 0 01-4.36-4.36V9.33a.55.55 0 01.55-.55zM15.27 20.5v1.64a.82.82 0 01-1.64 0V20.5zm-4.9 0v1.64a.82.82 0 01-1.64 0V20.5zM12 2.5a5.45 5.45 0 015.26 4H6.74A5.45 5.45 0 0112 2.5zm-2.18 2.18a.55.55 0 100 1.1.55.55 0 000-1.1zm4.36 0a.55.55 0 100 1.1.55.55 0 000-1.1z" fill="#3DDC84"/></svg>
        </div>
        <div class="os-btn-name">Android</div>
        <div class="os-btn-count" id="and-cnt">— equipos</div>
        <span class="os-chevron">›</span>
      </button>
    </div>
    <div class="sec-label">Catálogo</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="st-tot">—</div><div class="stat-lbl">Modelos</div></div>

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='s-home'||id==='s-catalog')window.scrollTo(0,0);
}
function goHome(){show('s-home');document.getElementById('search-in').value=''}

function showCatalog(os){
  curOS=os;curBrand='Todos';
  document.getElementById('cat-title').textContent=os==='ios'?'iPhone & iOS':'Android';
  document.getElementById('search-in').value='';
  buildFilters(os);renderDevs();show('s-catalog');
}
function buildFilters(os){
  const brands=['Todos',...new Set(CAT[os].map(d=>d.brand))];
  document.getElementById('fbar').innerHTML=brands.map(b=>`<div class="fpill${b==='Todos'?' on':''}" onclick="setFilter('${b}')">${b}</div>`).join('');
}
function setFilter(b){
  curBrand=b;
  document.querySelectorAll('.fpill').forEach(p=>p.classList.toggle('on',p.textContent===b));
  renderDevs();
}
function toggleView(){
  gridMode=!gridMode;
  document.getElementById('view-btn').textContent=gridMode?'Lista':'Grid';
  renderDevs();
}
function dc(s){return s==='RESURTIBLE'?'dot-r':s==='INV. LIMITADO EN CANAL'?'dot-l':'dot-n'}
function bs(s){const m={RESURTIBLE:'bs-r Resurtible','INV. LIMITADO EN CANAL':'bs-l Inv. limitado',NPI:'bs-n NPI'};const[c,...t]=(m[s]||'bs-r Resurtible').split(' ');return`<span class="bs ${c}">${t.join(' ')}</span>`}

function renderDevs(){
  const q=document.getElementById('search-in').value.toLowerCase();
  let devs=CAT[curOS];
  if(curBrand!=='Todos')devs=devs.filter(d=>d.brand===curBrand);
  if(q)devs=devs.filter(d=>d.name.toLowerCase().includes(q)||d.brand.toLowerCase().includes(q));
  const wrap=document.getElementById('dev-wrap');
  if(!devs.length){wrap.innerHTML='<div class="no-r">Sin resultados</div>';updateCmpBar();return}
  if(gridMode){
    wrap.innerHTML=`<div class="d-grid">${devs.map(d=>`
      <div class="d-card" onclick="showFicha('${d.id}')">
        <div class="d-img-wrap">
          ${imgI(d.id,'d-img')}
          <div class="d-dot ${dc(d.status)}"></div>
          <div class="d-cmp${cmpSet.has(d.id)?' sel':''}" onclick="event.stopPropagation();tCmp('${d.id}')">${cmpSet.has(d.id)?'✓':''}</div>
        </div>
        <div class="d-info">
          <div class="d-name">${d.name}</div>
          <div class="d-row2">
            <span class="d-brand">${d.brand}</span>
            ${d.bundle?'<span class="b-bun">Bundle</span>':''}
            ${d.storage.includes('/')?'<span class="b-2s">2alm</span>':''}
          </div>
        </div>
      </div>`).join('')}</div>`;
  } else {
    wrap.innerHTML=`<div class="d-list">${devs.map(d=>`
      <div class="d-row" onclick="showFicha('${d.id}')">
        <div class="d-row-img">${imgI(d.id,'')}</div>
        <div class="d-row-info">
          <div class="d-row-name">${d.name}</div>
          <div class="d-row-sub">${d.brand} · ${d.storage}</div>
          <div class="d-row-badges">${bs(d.status)}${d.bundle?'<span class="b-bun">Bundle</span>':''}</div>
        </div>
        <span class="d-row-chev">›</span>
      </div>`).join('')}</div>`;
  }
  updateCmpBar();
}
function tCmp(id){if(cmpSet.has(id))cmpSet.delete(id);else if(cmpSet.size<3)cmpSet.add(id);renderDevs()}
function clearCmp(){cmpSet.clear();renderDevs()}
function updateCmpBar(){
  const bar=document.getElementById('cmp-bar');
  document.getElementById('cmp-lbl').textContent=`${cmpSet.size} seleccionado${cmpSet.size!==1?'s':''} de 3`;
  bar.classList.toggle('vis',cmpSet.size>0);
}
function toggleFichaCmp(){
  if(!curFichaId)return;
  if(cmpSet.has(curFichaId))cmpSet.delete(curFichaId);
  else if(cmpSet.size<3)cmpSet.add(curFichaId);
  const btn=document.getElementById('f-cmp-btn');
  btn.textContent=cmpSet.has(curFichaId)?'✓ Comparar':'+ Comparar';
  btn.classList.toggle('on',cmpSet.has(curFichaId));
}

      <div class="sell-card">
        <div class="sell-head">Argumentos clave de venta</div>

        <div class="tt-title">${d.name} en TikTok</div>

        <button class="tt-btn" onclick="window.open(''+ ttWeb +'','_blank')">
          <svg width="16" height="16" viewBox="0 0 48 48"><path d="M32.5 10.5h-5v18.4c0 2.1-1.7 3.8-3.8 3.8s-3.8-1.7-3.8-3.8 1.7-3.8 3.8-3.8c.4 0 .8.1 1.2.2v-5.1c-.4-.1-.8-.1-1.2-.1-4.9 0-8.8 3.9-8.8 8.8S18.8 38 23.7 38c4.9 0 8.8-3.9 8.8-8.8V21c1.8 1.3 4 2 6.5 2v-5c-1.4 0-2.7-.4-3.8-1.1-1.6-1-2.7-2.7-2.7-4.7v-1.7z" fill="white"/></svg>

function swTab(t,el){
  document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tp').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tp-'+t).classList.add('on');
}
function goCompare(){
  if(cmpSet.size<2)return;
  const all=[...CAT.ios,...CAT.android];
  const devs=[...cmpSet].map(id=>all.find(d=>d.id===id)).filter(Boolean);
  const keys=[...new Set(devs.flatMap(d=>Object.keys(d.specs)))];
  const headers=devs.map(d=>`<th><div>${IMG[d.id]?`<img class="cmp-th-img" src="${IMG[d.id]}" onerror="this.style.display='none'" alt="" loading="lazy">`:'<span style="font-size:26px">📱</span>'}</div><div class="cmp-th-name">${d.name}</div><div class="cmp-th-brand">${d.brand}</div></th>`).join('');
  const rows=keys.map(k=>`<tr><td>${k}</td>${devs.map(d=>`<td>${d.specs[k]||'—'}</td>`).join('')}</tr>`).join('');
  document.getElementById('cmp-body').innerHTML=`<table class="cmp-tbl"><thead><tr><th></th>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
  show('s-compare');
}

// Stats

document.getElementById('ios-cnt').textContent=`${CAT.ios.length} equipos`;
document.getElementById('and-cnt').textContent=`${CAT.android.length} equipos`;
document.getElementById('st-tot').textContent=all.length;

document.getElementById('st-bun').textContent=all.filter(d=>d.bundle).length;

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/techguide/sw.js')

// PWA Install prompt
let deferredInstall=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredInstall=e;
  const banner=document.getElementById('install-banner');
  if(banner) banner.classList.remove('hidden');
});

document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredInstall){
    // Fallback: show manual instructions
    alert('Para instalar:\n\nAndroid: Menú ⋮ → "Agregar a pantalla de inicio"\n\niPhone Safari: Compartir → "Agregar a inicio"');
    return;
  }
  deferredInstall.prompt();
  const{outcome}=await deferredInstall.userChoice;
  deferredInstall=null;
  hideBanner();
});
</script>
